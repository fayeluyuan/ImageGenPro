<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImageGenPro</title>
  <link rel="stylesheet" href="/static/css/design-system.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="navbar-inner">
      <div class="brand" id="nav-brand" style="cursor:pointer;">ImageGen<span class="brand-accent">Pro</span></div>
      <nav class="navbar-nav">
        <a class="nav-link active" data-view="generate">生成</a>
        <a class="nav-link" data-view="templates">模板库</a>
        <a class="nav-link" data-view="favorites">收藏</a>
      </nav>
      <div class="navbar-actions">
        <div class="theme-toggle" role="group" aria-label="Theme switcher">
          <button class="theme-toggle-btn" data-theme-toggle="light" aria-pressed="false">Light</button>
          <button class="theme-toggle-btn" data-theme-toggle="dark" aria-pressed="false">Dark</button>
          <button class="theme-toggle-btn" data-theme-toggle="system" aria-pressed="false">System</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content page-wrapper">

    <!-- Generate View -->
    <div class="view-container" id="view-generate">
      <div class="three-column-layout">

        <!-- Left Column: Configuration -->
        <aside class="column-left">

          <!-- API Config -->
          <div class="card api-config-card">
            <div class="card-header">
              <div>
                <div class="card-title">API 配置</div>
                <div class="card-subtitle">选择服务商与模型</div>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="provider">服务商</label>
              <select class="form-select" id="provider">
                <option value="lieniao">烈鸟 API</option>
                <option value="custom">自定义 API</option>
              </select>
            </div>
            <div class="form-group" id="model-group">
              <label class="form-label" for="model">模型</label>
              <select class="form-select" id="model">
                <option value="gemini-2.0-flash-exp-image-generation">gemini-2.0-flash-exp-image-generation [性价比高]</option>
                <option value="gemini-3.1-flash-image-preview">gemini-3.1-flash-image-preview [平衡之选]</option>
                <option value="gemini-3-pro-image-preview">gemini-3-pro-image-preview [质量最佳 · 较贵]</option>
                <option value="gemini-1.5-pro-image-preview">gemini-1.5-pro-image-preview [通用场景]</option>
                <option value="custom">自定义模型名称</option>
              </select>
            </div>
            <div class="form-group hidden" id="custom-model-group">
              <label class="form-label" for="custom-model">自定义模型</label>
              <input class="form-input" type="text" id="custom-model" placeholder="输入模型名称">
            </div>
            <div class="form-group">
              <label class="form-label" for="api-key">API 密钥</label>
              <div class="password-input-wrap">
                <input class="form-input" type="password" id="api-key" placeholder="sk-...">
                <button type="button" class="password-toggle" id="api-key-toggle" aria-label="显示密码">👁</button>
              </div>
            </div>
            <div class="form-group hidden" id="custom-url-group">
              <label class="form-label" for="custom-url">自定义 API 地址</label>
              <input class="form-input" type="text" id="custom-url" placeholder="https://api.example.com/v1">
            </div>
          </div>

          <!-- Output Config -->
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">输出配置</div>
                <div class="card-subtitle">画幅比例与画质</div>
              </div>
            </div>
            <div class="form-group">
              <span class="aspect-group-label">画幅比例</span>
              <div class="pill-group" data-aspect-group>
                <button class="btn btn-pill active" data-aspect="1:1">1:1</button>
                <button class="btn btn-pill" data-aspect="3:4">3:4</button>
                <button class="btn btn-pill" data-aspect="4:3">4:3</button>
                <button class="btn btn-pill" data-aspect="16:9">16:9</button>
                <button class="btn btn-pill" data-aspect="9:16">9:16</button>
              </div>
            </div>
            <div class="form-group" style="margin-top: 14px;">
              <span class="aspect-group-label">画质</span>
              <div class="pill-group" data-quality-group>
                <button class="btn btn-pill active" data-quality="1k">1k</button>
                <button class="btn btn-pill" data-quality="2k">2k</button>
                <button class="btn btn-pill" data-quality="4k">4k</button>
              </div>
            </div>
          </div>

          <!-- Reference Image Upload -->
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">参考图</div>
                <div class="card-subtitle">拖拽上传或点击选择</div>
              </div>
            </div>
            <div class="drop-zone" data-drop-zone id="ref-drop-zone">
              <input type="file" multiple accept="image/*" class="sr-only" id="ref-file-input">
              <div class="drop-zone-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17,8 12,3 7,8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </div>
              <div class="drop-zone-text">点击或拖拽图片到此处</div>
              <div class="drop-zone-hint">支持 JPG、PNG、WebP</div>
            </div>
            <div class="ref-thumb-grid" id="ref-thumb-grid">
              <!-- thumbnails injected here -->
            </div>
            <button class="btn btn-secondary btn-sm btn-block" id="copy-ref-paths" style="margin-top: 12px;">📋 复制所有参考图路径</button>
          </div>

          <!-- Output Directory & Generate -->
          <div class="card generate-card">
            <div class="form-group">
              <label class="form-label" for="output-dir">输出目录</label>
              <div class="output-dir-row">
                <input class="form-input" type="text" id="output-dir" placeholder="/mnt/e/Outputs/ImageGenPro">
                <button class="btn btn-secondary" id="browse-output-dir" type="button">浏览</button>
              </div>
            </div>
            <button class="btn btn-primary btn-block" id="start-batch">开始批量生成</button>
          </div>

        </aside>

        <!-- Center Column: Prompt Tasks -->
        <section class="column-center" id="prompt-center">
          <div class="section-header">
            <div>
              <div class="section-title">提示词任务列表</div>
              <div class="section-subtitle">批量配置生成任务</div>
            </div>
          </div>

          <div class="prompt-list" id="prompt-list">
            <!-- prompt cards injected here -->
          </div>

          <button class="btn btn-secondary btn-block" id="add-prompt-card" style="margin-top: 8px;">+ 添加提示词</button>
        </section>

        <!-- Right Column: Preview -->
        <aside class="column-right">
          <div class="card preview-card">
            <div class="card-header">
              <div>
                <div class="card-title">预览</div>
                <div class="card-subtitle" id="preview-subtitle">生成结果将在此显示</div>
              </div>
              <span class="badge badge-success" id="preview-badge">就绪</span>
            </div>
            <div class="preview-large" id="preview-large" style="height:400px;">
              <div class="preview-placeholder" id="preview-placeholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21,15 16,10 5,21"/>
                </svg>
                <div>暂无预览</div>
              </div>
              <div class="preview-loading hidden" id="preview-loading">
                <div class="loading-ripple"></div>
                <div class="loading-text">正在生成中...</div>
              </div>
              <img class="preview-image hidden" id="preview-image" src="" alt="preview">
            </div>
            <div class="preview-progress-wrap hidden" id="preview-progress-wrap">
              <div class="preview-progress-bar" id="preview-progress-bar" style="width:0%"></div>
            </div>
            <div class="preview-meta" id="preview-meta" style="margin-top: 12px;">
              <span id="preview-dims">1024 × 1024</span>
              <span>•</span>
              <span id="preview-status">等待生成</span>
            </div>
          </div>

          <div class="card">
            <div class="card-header" style="margin-bottom:12px;">
              <div>
                <div class="card-title">历史缩略图</div>
                <div class="card-subtitle">最近生成的图片</div>
              </div>
            </div>
            <div class="preview-tabs" id="preview-tabs">
              <button class="preview-tab active" data-tab="all">全部</button>
              <button class="preview-tab" data-tab="success">成功</button>
              <button class="preview-tab" data-tab="failed">失败</button>
            </div>
            <div class="preview-thumbnails" id="preview-thumbnails">
              <div class="thumb-empty">暂无生成记录</div>
            </div>
          </div>
        </aside>

      </div>
    </div>

    <!-- Templates View -->
    <div class="view-container hidden" id="view-templates">
      <div class="page-header">
        <h1 class="page-title">模板库</h1>
        <button class="btn btn-primary" id="btn-new-template">+ 新建模板</button>
      </div>
      <div class="template-tabs" id="template-tabs">
        <button class="template-tab active" data-filter="all">全部</button>
        <button class="template-tab" data-filter="builtin">内置模板</button>
        <button class="template-tab" data-filter="custom">我的收藏</button>
        <button class="template-tab" data-filter="recent">最近使用</button>
      </div>
      <div class="template-grid-page" id="template-grid-page">
        <!-- template cards injected here -->
      </div>
    </div>

    <!-- Favorites View -->
    <div class="view-container hidden" id="view-favorites">
      <div class="page-header">
        <h1 class="page-title">我的收藏</h1>
      </div>
      <div class="favorites-search-wrap">
        <input type="text" class="form-input" id="favorites-search" placeholder="搜索收藏...">
      </div>
      <div class="favorites-list" id="favorites-list">
        <!-- favorite cards injected here -->
      </div>
    </div>

  </main>

  <!-- Template Popup (legacy inline template selector for prompt cards) -->
  <div class="template-popup-overlay hidden" id="template-popup">
    <div class="template-popup">
      <div class="template-popup-header">
        <div class="template-popup-title">选择模板</div>
        <button class="btn-icon" id="close-template-popup">✕</button>
      </div>
      <div class="template-grid" id="template-popup-grid">
        <!-- dynamic template items -->
      </div>
    </div>
  </div>

  <!-- Generate Complete Modal -->
  <div class="modal-overlay hidden" id="generate-modal">
    <div class="modal" style="max-width:360px; text-align:center;">
      <div class="modal-header" style="justify-content:center;">
        <div class="modal-title">🎉 批量生成完成</div>
      </div>
      <div class="modal-body">
        <div style="display:flex; justify-content:center; gap:24px; margin:16px 0;">
          <div style="text-align:center;">
            <div style="font-size:32px; font-weight:700; color:var(--color-success);"><span id="modal-success-count">0</span></div>
            <div style="font-size:12px; color:var(--text-tertiary);">成功</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:32px; font-weight:700; color:var(--color-error);"><span id="modal-fail-count">0</span></div>
            <div style="font-size:12px; color:var(--text-tertiary);">失败</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:32px; font-weight:700; color:var(--text-secondary);"><span id="modal-skip-count">0</span></div>
            <div style="font-size:12px; color:var(--text-tertiary);">跳过</div>
          </div>
        </div>
        <div style="font-size:13px; color:var(--text-tertiary);">耗时: <span id="modal-time">刚刚完成</span></div>
      </div>
      <div class="modal-footer" style="justify-content:center;">
        <button class="btn btn-primary" id="close-generate-modal">关闭</button>
      </div>
    </div>
  </div>

  <!-- New Template Modal -->
  <div class="modal-overlay hidden" id="new-template-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">新建模板</div>
        <button class="btn-icon" id="close-new-template-modal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">模板名称</label>
          <input type="text" class="form-input" id="new-template-name" placeholder="例如：电商白底图">
        </div>
        <div class="form-group">
          <label class="form-label">模板内容</label>
          <textarea class="form-textarea" id="new-template-content" placeholder="一款[产品]，简约设计..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancel-new-template">取消</button>
        <button class="btn btn-primary" id="save-new-template">保存</button>
      </div>
    </div>
  </div>

  <!-- Save Favorite Modal -->
  <div class="modal-overlay hidden" id="save-favorite-modal">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header">
        <div class="modal-title">保存到收藏</div>
        <button class="btn-icon" id="close-save-favorite-modal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">收藏名称</label>
          <input type="text" class="form-input" id="save-favorite-name" placeholder="例如：雨夜街头">
        </div>
        <div class="form-group">
          <label class="form-label">提示词内容</label>
          <textarea class="form-textarea" id="save-favorite-content" readonly></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancel-save-favorite">取消</button>
        <button class="btn btn-primary" id="confirm-save-favorite">保存</button>
      </div>
    </div>
  </div>

  <!-- Product Input Modal (for templates with [产品]) -->
  <div class="modal-overlay hidden" id="product-input-modal">
    <div class="modal" style="max-width:380px;">
      <div class="modal-header">
        <div class="modal-title">填写产品名称</div>
        <button class="btn-icon" id="close-product-input-modal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">产品名</label>
          <input type="text" class="form-input" id="product-input-value" placeholder="例如：无线蓝牙耳机">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancel-product-input">取消</button>
        <button class="btn btn-primary" id="confirm-product-input">确定</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for browse button -->
  <input type="file" id="browse-dir-input" class="sr-only" webkitdirectory directory>

  <script src="/static/js/theme-manager.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
